<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RFID Wallet Dashboard</title>

    <!-- Tailwind via CDN for simplicity, configuring iOS 26 palette -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                        mono: ['"SF Mono"', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace']
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a'
                        },
                        neutral: {
                            50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 300: '#d1d5db',
                            400: '#9ca3af', 500: '#6b7280', 600: '#4b5563', 700: '#374151',
                            800: '#1f2937', 900: '#111827'
                        },
                        semantic: {
                            success: '#10B981',
                            warning: '#F59E0B',
                            error: '#EF4444',
                            info: '#3B82F6',
                            bg: '#f9fafb',
                            fg: '#111827',
                            separator: '#e5e7eb'
                        }
                    },
                    boxShadow: {
                        'ios-modal': '0 10px 40px -10px rgba(0,0,0,0.1)',
                        'ios-card': '0 4px 20px -5px rgba(0,0,0,0.05)'
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom iOS Spring Animations & Utils */
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-spring {
            animation: slideIn 0.3s cubic-bezier(0.2, 0, 1, 1) forwards;
        }

        .tab-active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }

        .tab-inactive {
            color: #6b7280;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* SF Pro Font Faces (fallback to system if not installed, but ideally included) */
    </style>
</head>

<body class="bg-semantic-bg text-semantic-fg font-sans min-h-screen antialiased selection:bg-primary-200">

    <!-- Main Container: 12-col grid basis -->
    <div class="max-w-7xl mx-auto px-5 py-8 md:py-12 relative animate-spring">

        <!-- Header -->
        <header class="mb-10 flex flex-col items-center text-center">
            <div
                class="h-16 w-16 mb-4 rounded-2xl bg-gradient-to-tr from-primary-500 to-indigo-500 shadow-ios-modal flex items-center justify-center text-white">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z">
                    </path>
                </svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-semibold tracking-tight">RFID Wallet</h1>
            <p class="mt-2 text-neutral-500 text-lg max-w-md">Real-time payment and top-up dashboard.</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex justify-center border-b border-semantic-separator mb-8 max-w-2xl mx-auto">
            <button id="tab-topup"
                class="px-6 py-3 font-medium text-[16pt] transition-colors duration-200 tab-active">Top-Up
                (Admin)</button>
            <button id="tab-payment"
                class="px-6 py-3 font-medium text-[16pt] transition-colors duration-200 tab-inactive">Payment
                (Cashier)</button>
        </div>

        <!-- Active Card Status (Real-time Broadcast) -->
        <div
            class="max-w-2xl mx-auto mb-8 bg-white rounded-2xl shadow-ios-card p-6 border border-neutral-100 flex items-center justify-between transition-transform duration-300 hover:scale-[1.01]">
            <div class="flex items-center space-x-4">
                <div
                    class="h-12 w-12 rounded-full bg-primary-50 flex items-center justify-center text-primary-500 relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z">
                        </path>
                    </svg>
                    <span id="ws-indicator"
                        class="absolute top-0 right-0 w-3 h-3 bg-semantic-error rounded-full border-2 border-white"></span>
                </div>
                <div>
                    <p class="text-sm font-medium text-neutral-500 uppercase tracking-wide">Last Tapped Card</p>
                    <p id="tapped-uid" class="text-xl font-mono font-medium text-neutral-900 mt-1">Waiting for card...
                    </p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-medium text-neutral-500 uppercase tracking-wide">Balance</p>
                <p id="tapped-balance" class="text-3xl font-semibold text-primary-600 tracking-tight">0</p>
            </div>
        </div>

        <div class="max-w-2xl mx-auto relative overflow-hidden" style="min-height: 440px;">
            <!-- Top-Up Section -->
            <section id="section-topup"
                class="absolute inset-x-0 top-0 transition-all duration-400 ease-[cubic-bezier(0.2,0,1,1)] bg-white rounded-3xl shadow-ios-modal p-8 border border-neutral-100 opacity-100 transform translate-x-0 z-10">
                <h2 class="text-[22pt] font-semibold mb-6">Fund Account</h2>
                <form id="form-topup" class="space-y-4">
                    <div>
                        <label class="block text-[14pt] font-medium text-neutral-700 mb-2">Card UID <span
                                class="text-sm font-normal text-neutral-400 ml-2">(Auto-fills on tap)</span></label>
                        <input type="text" id="topup-uid" required
                            class="w-full px-4 py-3 rounded-xl bg-neutral-50 border border-neutral-200 text-lg transition-all focus:bg-white"
                            placeholder="Tap card or enter UID">
                    </div>
                    <div>
                        <label class="block text-[14pt] font-medium text-neutral-700 mb-2">Amount
                            (Cents/Credits)</label>
                        <input type="number" id="topup-amount" required min="1"
                            class="w-full px-4 py-3 rounded-xl bg-neutral-50 border border-neutral-200 text-lg transition-all focus:bg-white"
                            placeholder="e.g. 1000">
                    </div>
                    <button type="submit"
                        class="w-full py-4 mt-2 bg-primary-500 hover:bg-primary-600 active:bg-primary-700 text-white font-semibold text-[16pt] rounded-xl shadow-[0_4px_14px_0_rgba(59,130,246,0.39)] transition-colors duration-200">
                        Confirm Top-Up
                    </button>
                </form>
                <div id="topup-result" class="mt-4 p-4 rounded-xl hidden flex items-center mb-0"></div>
            </section>

            <!-- Payment Section -->
            <section id="section-payment"
                class="absolute inset-x-0 top-0 transition-all duration-400 ease-[cubic-bezier(0.2,0,1,1)] bg-white rounded-3xl shadow-ios-modal p-8 border border-neutral-100 opacity-0 transform translate-x-[110%] pointer-events-none z-0">
                <h2 class="text-[22pt] font-semibold mb-6">Process Payment</h2>
                <form id="form-payment" class="space-y-4">
                    <div>
                        <label class="block text-[14pt] font-medium text-neutral-700 mb-2">Card UID <span
                                class="text-sm font-normal text-neutral-400 ml-2">(Auto-fills on tap)</span></label>
                        <input type="text" id="pay-uid" required
                            class="w-full px-4 py-3 rounded-xl bg-neutral-50 border border-neutral-200 text-lg transition-all focus:bg-white"
                            placeholder="Tap card or enter UID">
                    </div>
                    <div class="grid grid-cols-[2fr_1fr] gap-4">
                        <div>
                            <label class="block text-[14pt] font-medium text-neutral-700 mb-2">Product</label>
                            <select id="pay-product"
                                class="w-full px-4 py-3 rounded-xl bg-neutral-50 border border-neutral-200 text-lg focus:ring-2 focus:ring-primary-500 outline-none transition-all cursor-pointer">
                                <option value="">Loading products...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[14pt] font-medium text-neutral-700 mb-2">Quantity</label>
                            <input type="number" id="pay-quantity" value="1" min="1" required
                                class="w-full px-4 py-3 rounded-xl bg-neutral-50 border border-neutral-200 text-lg transition-all focus:bg-white">
                        </div>
                    </div>

                    <div
                        class="pt-4 mt-2 border-t border-neutral-100 flex justify-between items-center bg-neutral-50 px-5 py-4 rounded-xl">
                        <span class="text-neutral-600 font-medium text-[16pt]">Total Cost</span>
                        <span id="pay-total"
                            class="text-3xl font-semibold font-mono text-neutral-900 tracking-tight">0</span>
                    </div>

                    <button type="submit"
                        class="w-full py-4 mt-2 bg-semantic-success hover:bg-[#059669] active:bg-[#047857] text-white font-semibold text-[16pt] rounded-xl shadow-[0_4px_14px_0_rgba(16,185,129,0.39)] transition-colors duration-200">
                        Charge Card
                    </button>
                </form>
                <div id="pay-result" class="mt-4 p-4 rounded-xl hidden flex items-center mb-0"></div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
